# Beispiel-Snippet für die bestehende nginx-Server-Konfiguration von
# stammchannel.de. Diese Datei wird nicht automatisch geladen — die
# passenden Zeilen müssen manuell in die echte Server-Konfiguration
# (z. B. /etc/nginx/sites-available/stammchannel.de) übernommen werden.

# Erlaubt größere Uploads (Musikdateien + Cover). Wert an die in
# Admin -> Einstellungen konfigurierten Limits anpassen.
client_max_body_size 100M;

# Verhindert direkten Zugriff auf hochgeladene Musik-/Cover-Dateien.
# Diese werden ausschließlich über /music/file.php (mit Login-Prüfung)
# ausgeliefert. Ersetzt die (unter nginx wirkungslose) .htaccess-Datei.
location ^~ /uploads/ {
    deny all;
    return 404;
}

# Verhindert, dass PHP-Dateien in Upload-Verzeichnissen ausgeführt werden
# könnten, falls diese Regel doch einmal umgangen wird.
location ~* ^/uploads/.*\.php$ {
    deny all;
    return 404;
}
